name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ""
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        if: matrix.goarch == 'amd64'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o octoj-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/octoj

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: octoj-${{ matrix.goos }}-${{ matrix.goarch }}
          path: octoj-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 7
